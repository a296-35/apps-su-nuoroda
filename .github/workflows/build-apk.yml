name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Atsisiųsti kodą
        uses: actions/checkout@v4

      - name: ☕ Nustatyti JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Nustatyti Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Generuoti Gradle wrapper
        run: |
          # Atsisiunčiam Gradle wrapper (be jo neveikia)
          cd app
          mkdir -p gradle/wrapper
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          # Sukuriam gradle wrapper properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.5-bin.zip
          networkTimeout=10000
          validateDistributionUrl=true
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: 🏗️ Build APK (per gradle)
        run: |
          cd app
          sudo apt-get update -qq
          sudo apt-get install -y -qq gradle 2>/dev/null || true
          gradle wrapper --gradle-version=8.5 2>/dev/null || true
          gradle :app:assembleDebug --no-daemon 2>&1

      - name: 📤 Įkelti APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apps-su-nuoroda-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    name: Release APK (signed)
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Atsisiųsti kodą
        uses: actions/checkout@v4

      - name: ☕ Nustatyti JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Nustatyti Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔐 Sukurti keystore
        run: |
          cd app
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=, OU=, O=, L=, S=, C="

      - name: 🏗️ Build Release APK
        run: |
          cd app
          sudo apt-get install -y -qq gradle 2>/dev/null || true
          gradle :app:assembleRelease --no-daemon 2>&1

      - name: 📤 Įkelti Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apps-su-nuoroda-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
