name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Atsisiųsti kodą
        uses: actions/checkout@v4

      - name: ☕ Nustatyti JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Nustatyti Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Build APK
        run: |
          # Atsisiunčiam Gradle 8.5 (apt turi per seną)
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          export PATH="/opt/gradle-8.5/bin:$PATH"
          gradle --version

          # Nustatom ANDROID_HOME
          echo "sdk.dir=$ANDROID_HOME" > local.properties

          # Build
          gradle assembleDebug --no-daemon --stacktrace 2>&1

      - name: 📤 Įkelti APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apps-su-nuoroda-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
