name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - '*.gradle.kts'
      - 'gradle/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # leidžia paleisti rankiniu būdu

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Atsisiųsti kodą
        uses: actions/checkout@v4

      - name: ☕ Nustatyti JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Nustatyti Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔧 Įrašyti gradle.properties
        run: |
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties

      - name: 🎯 Suteikti vykdymo teises Gradle wrapper
        run: chmod +x gradlew || true
        # gradlew neegzistuoja, bet jei pridėsi — veiks

      - name: 🏗️ Build APK
        run: |
          if [ -f gradlew ]; then
            ./gradlew assembleDebug
          else
            # Jei nėra gradlew, naudojam gradle per package manager
            sudo apt-get update -qq
            sudo apt-get install -y -qq gradle 2>/dev/null || true
            gradle assembleDebug
          fi

      - name: 📤 Įkelti APK kaip artifact
        uses: actions/upload-artifact@v4
        with:
          name: apps-su-nuoroda-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  release:
    name: Release APK (signed)
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Atsisiųsti kodą
        uses: actions/checkout@v4

      - name: ☕ Nustatyti JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Nustatyti Android SDK
        uses: android-actions/setup-android@v3

      - name: 🔐 Sukurti keystore
        run: |
          cd app
          keytool -genkey -v \
            -keystore release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=, OU=, O=, L=, S=, C="

      - name: 🏗️ Build Release APK
        run: |
          sudo apt-get install -y -qq gradle 2>/dev/null || true
          gradle assembleRelease

      - name: 📤 Įkelti Release APK
        uses: actions/upload-artifact@v4
        with:
          name: apps-su-nuoroda-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
